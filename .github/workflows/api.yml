name: Deploy Mimre API

on:
  push:
    branches: [ main ]
    paths:
      - 'Mimre.Api/**'
      - 'Mimre.Application/**'
      - 'Mimre.Domain/**'
      - 'Mimre.Infrastructure/**'
      - '.github/workflows/api.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Mimre.Api/Mimre.Api.csproj'
  PUBLISH_PATH: './publish/api'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project Mimre.Infrastructure/Mimre.Infrastructure.csproj \
            --startup-project Mimre.Api/Mimre.Api.csproj \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

     - name: Zip publish output
        run: |
          cd ${{ env.PUBLISH_PATH }}
          zip -r ../app.zip .

      - name: Deploy to Azure App Service
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp deploy \
              --name mimre-api \
              --resource-group mimre-rg \
              --src-path ${{ env.PUBLISH_PATH }} \
              --type zip

      - name: Logout from Azure
        run: az logout