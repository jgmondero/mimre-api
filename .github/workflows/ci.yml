name: Mimre CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Mimre.sln

      - name: Build solution
        run: dotnet build Mimre.sln --configuration Release --no-restore

      - name: Verify API publishes successfully
        run: dotnet publish Mimre.Api/Mimre.Api.csproj --configuration Release --no-build

      - name: Verify Worker publishes successfully
        run: dotnet publish Mimre.Worker/Mimre.Worker.csproj --configuration Release --no-build
