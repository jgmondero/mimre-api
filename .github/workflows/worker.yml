name: Deploy Mimre Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'Mimre.Worker/**'
      - 'Mimre.Application/**'
      - 'Mimre.Domain/**'
      - 'Mimre.Infrastructure/**'
      - '.github/workflows/worker.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Mimre.Worker/Mimre.Worker.csproj'
  PUBLISH_PATH: './publish/worker'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mimre-worker'
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_PATH }}
          os-type: 'Linux'

      - name: Logout from Azure
        run: az logout